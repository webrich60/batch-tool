<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズデータ自動変換＆一括登録ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- ヘッダー -->
        <div class="bg-white rounded-2xl shadow-[4px_4px_0_0_#1e293b] p-6 border-4 border-slate-800 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🧬</span>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-slate-900">クイズ自動生成＆一括登録ツール</h1>
                    <p class="text-sm font-bold text-slate-500 mt-1">抽出メモから一瞬で4択クイズを作り、データベースへ転送します</p>
                </div>
            </div>
            <!-- APIキー設定エリア -->
            <div class="flex flex-col gap-1 shrink-0 bg-yellow-50 border-2 border-slate-800 p-3 rounded-xl shadow-[2px_2px_0_0_#1e293b] max-w-xs">
                <label class="text-xs font-black text-slate-700 flex items-center gap-1">
                    <span>🔑</span> Gemini APIキーを入力
                </label>
                <div class="flex gap-2">
                    <input type="password" id="api-key-input" placeholder="AIzaSy..." class="w-full px-3 py-1.5 rounded-lg border-2 border-slate-800 text-xs font-bold focus:outline-none focus:bg-white bg-slate-50">
                    <button id="save-api-key-btn" class="shrink-0 px-3 py-1.5 bg-slate-800 text-white text-xs font-bold rounded-lg shadow-[2px_2px_0_0_#94a3b8] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">保存</button>
                </div>
                <p class="text-[9px] text-slate-500 font-bold leading-tight mt-1">※ブラウザに安全に保存されます。</p>
            </div>
        </div>

        <!-- 2カラムメインエリア -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <!-- 左カラム：AIクイズジェネレーター -->
            <div class="lg:col-span-5 bg-white rounded-2xl shadow-[6px_6px_0_0_#1e293b] p-6 border-4 border-slate-800 space-y-4">
                <div class="flex items-center gap-2 border-b-2 border-slate-200 pb-3">
                    <span class="text-2xl">🤖</span>
                    <h2 class="text-xl font-black text-slate-800">1. AIで4択クイズに自動変換</h2>
                </div>
                
                <p class="text-xs font-bold text-slate-600 leading-relaxed bg-blue-50 border-2 border-blue-200 p-3 rounded-xl">
                    テキストをここに貼り付けてください。AIが「カテゴリ分類」「ハズレ選択肢の考案」「豆知識解説」を自動で補完します。
                </p>

                <div>
                    <div class="flex justify-between items-end mb-2">
                        <label class="block text-xs font-black text-slate-700">生の入力テキスト</label>
                        <button id="clear-raw-text-btn" class="flex items-center gap-1 text-xs font-bold text-slate-600 hover:text-red-600 transition-colors bg-white border-2 border-slate-300 px-2 py-1 rounded-md shadow-[2px_2px_0_0_#cbd5e1] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none">
                            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            <span id="clear-raw-text-btn-text">クリア</span>
                        </button>
                    </div>
                    <textarea id="raw-text-input" rows="12" class="w-full px-4 py-3 rounded-xl border-2 border-slate-800 bg-slate-50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold text-sm transition-all resize-y" placeholder="【入力例】&#10;Q: 越前がにのオスのブランド名は？ A: 越前がに"></textarea>
                </div>

                <button id="generate-btn" class="w-full py-4 rounded-xl bg-emerald-500 text-white font-black border-2 border-slate-800 shadow-[4px_4px_0_0_#1e293b] active:translate-y-[4px] active:translate-x-[4px] active:shadow-none transition-all text-base flex items-center justify-center gap-2">
                    <span id="generate-btn-text">✨ AIで4択クイズ（JSON）に変換する</span>
                    <!-- クルクル回るスピナー（初期状態は隠す） -->
                    <svg id="generate-spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </div>

            <!-- 右カラム：一括登録エリア -->
            <div class="lg:col-span-7 bg-white rounded-2xl shadow-[6px_6px_0_0_#1e293b] p-6 border-4 border-slate-800 space-y-4">
                <div class="flex items-center gap-2 border-b-2 border-slate-200 pb-3">
                    <span class="text-2xl">🔥</span>
                    <h2 class="text-xl font-black text-slate-800">2. クイズJSON確認 ＆ Firestore登録</h2>
                </div>

                <!-- JSON出力/入力エリア -->
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <label class="block text-xs font-black text-slate-700">アップロード用JSONデータ（確認・微調整用）</label>
                        <div class="flex gap-2">
                            <button id="clear-json-btn" class="flex items-center gap-1 text-xs font-bold text-slate-600 hover:text-red-600 transition-colors bg-white border-2 border-slate-300 px-2 py-1 rounded-md shadow-[2px_2px_0_0_#cbd5e1] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none">
                                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                <span id="clear-btn-text">クリア</span>
                            </button>
                            <button id="copy-json-btn" class="flex items-center gap-1 text-xs font-bold text-slate-600 hover:text-blue-600 transition-colors bg-white border-2 border-slate-300 px-2 py-1 rounded-md shadow-[2px_2px_0_0_#cbd5e1] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none">
                                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>
                                <span id="copy-btn-text">コピー</span>
                            </button>
                        </div>
                    </div>
                    <textarea id="json-input" rows="15" class="w-full px-4 py-3 rounded-xl border-2 border-slate-800 bg-slate-50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 font-mono text-xs transition-all resize-y" placeholder="[&#10;  {&#10;    &quot;id&quot;: &quot;g1&quot;,&#10;    &quot;category&quot;: &quot;グルメ&quot;,&#10;    &quot;question&quot;: &quot;問題文...&quot;,&#10;    &quot;options&quot;: [&quot;A&quot;, &quot;B&quot;, &quot;C&quot;, &quot;D&quot;],&#10;    &quot;answer&quot;: &quot;A&quot;,&#10;    &quot;explanation&quot;: &quot;解説文...&quot;&#10;  }&#10;]"></textarea>
                </div>

                <!-- Firestoreへの送信ボタン -->
                <button id="upload-btn" class="w-full py-4 rounded-xl bg-blue-600 text-white font-black border-2 border-slate-800 shadow-[4px_4px_0_0_#1e293b] active:translate-y-[4px] active:translate-x-[4px] active:shadow-none transition-all text-lg flex items-center justify-center gap-2">
                    <span id="upload-btn-text">🚀 Firestoreに一括アップロード</span>
                    <!-- クルクル回るスピナー（初期状態は隠す） -->
                    <svg id="upload-spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </div>

        </div>

        <!-- 進捗・ログ・エラー出力エリア -->
        <div id="status-message" class="p-4 rounded-xl font-bold hidden border-2"></div>

    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // =====================================================================
        // ⚠️ Firebase プロジェクトの設定
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD6V_544Yz1wmx9SwaYNm6MZBalUE808Bc",
            authDomain: "fukui-test-3d53f.firebaseapp.com",
            projectId: "fukui-test-3d53f",
            storageBucket: "fukui-test-3d53f.firebasestorage.app",
            messagingSenderId: "679373035685",
            appId: "1:679373035685:web:0bc85230b96f925f0cd54c",
            measurementId: "G-RD5YWEDR1K"
        };

        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            console.log("🔥 Firebaseに正常に接続されました！");
        } catch (error) {
            showStatus("Firebaseの初期化に失敗しました。firebaseConfigの設定を確認してください。", "error");
        }

        const apiKeyInput = document.getElementById('api-key-input');
        const saveApiKeyBtn = document.getElementById('save-api-key-btn');
        const rawTextInput = document.getElementById('raw-text-input');
        const clearRawTextBtn = document.getElementById('clear-raw-text-btn');
        const clearRawTextBtnText = document.getElementById('clear-raw-text-btn-text');
        
        // 生成ボタン関連の要素
        const generateBtn = document.getElementById('generate-btn');
        const generateBtnText = document.getElementById('generate-btn-text');
        const generateSpinner = document.getElementById('generate-spinner');
        
        const jsonInput = document.getElementById('json-input');
        const copyJsonBtn = document.getElementById('copy-json-btn');
        const copyBtnText = document.getElementById('copy-btn-text');
        const clearJsonBtn = document.getElementById('clear-json-btn');
        const clearBtnText = document.getElementById('clear-btn-text');
        
        // アップロードボタン関連の要素
        const uploadBtn = document.getElementById('upload-btn');
        const uploadBtnText = document.getElementById('upload-btn-text');
        const uploadSpinner = document.getElementById('upload-spinner');
        
        const statusDiv = document.getElementById('status-message');

        const savedApiKey = localStorage.getItem('gemini_api_key');
        if (savedApiKey) apiKeyInput.value = savedApiKey;

        // 保存ボタンを押したときの処理
        saveApiKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                showStatus("🔑 APIキーをブラウザに保存しました。次回から入力は不要です。", "info");
            } else {
                localStorage.removeItem('gemini_api_key');
                showStatus("⚠️ APIキーの保存を解除しました。", "warn");
            }
        });

        // コピーボタンを押したときの処理
        copyJsonBtn.addEventListener('click', () => {
            if (!jsonInput.value.trim()) {
                showStatus("⚠️ コピーするJSONデータがありません。", "warn");
                return;
            }
            try {
                // テキストを選択してコピーを実行（iframe等のセキュリティ制約に強い方法）
                jsonInput.select();
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                
                // ボタンの見た目を一時的に変更して完了を伝える
                const originalText = copyBtnText.textContent;
                copyBtnText.textContent = "コピー完了！";
                copyJsonBtn.classList.replace("text-slate-600", "text-emerald-600");
                copyJsonBtn.classList.replace("border-slate-300", "border-emerald-400");
                copyJsonBtn.classList.add("bg-emerald-50");
                
                setTimeout(() => {
                    copyBtnText.textContent = originalText;
                    copyJsonBtn.classList.replace("text-emerald-600", "text-slate-600");
                    copyJsonBtn.classList.replace("border-emerald-400", "border-slate-300");
                    copyJsonBtn.classList.remove("bg-emerald-50");
                }, 2000);
            } catch (err) {
                showStatus("❌ コピーに失敗しました。", "error");
            }
        });

        // 左側のクリアボタンを押したときの処理
        clearRawTextBtn.addEventListener('click', () => {
            if (!rawTextInput.value.trim()) return;
            
            rawTextInput.value = '';
            
            // ボタンの見た目を一時的に変更して完了を伝える
            const originalText = clearRawTextBtnText.textContent;
            clearRawTextBtnText.textContent = "クリア完了";
            clearRawTextBtn.classList.replace("text-slate-600", "text-red-600");
            clearRawTextBtn.classList.replace("border-slate-300", "border-red-400");
            clearRawTextBtn.classList.add("bg-red-50");
            
            setTimeout(() => {
                clearRawTextBtnText.textContent = originalText;
                clearRawTextBtn.classList.replace("text-red-600", "text-slate-600");
                clearRawTextBtn.classList.replace("border-red-400", "border-slate-300");
                clearRawTextBtn.classList.remove("bg-red-50");
            }, 2000);
        });

        // 右側のクリアボタンを押したときの処理
        clearJsonBtn.addEventListener('click', () => {
            if (!jsonInput.value.trim()) return;
            
            jsonInput.value = '';
            
            // ボタンの見た目を一時的に変更して完了を伝える
            const originalText = clearBtnText.textContent;
            clearBtnText.textContent = "クリア完了";
            clearJsonBtn.classList.replace("text-slate-600", "text-red-600");
            clearJsonBtn.classList.replace("border-slate-300", "border-red-400");
            clearJsonBtn.classList.add("bg-red-50");
            
            setTimeout(() => {
                clearBtnText.textContent = originalText;
                clearJsonBtn.classList.replace("text-red-600", "text-slate-600");
                clearJsonBtn.classList.replace("border-red-400", "border-slate-300");
                clearJsonBtn.classList.remove("bg-red-50");
            }, 2000);
        });

        function showStatus(message, type) {
            statusDiv.className = 'p-4 rounded-xl font-bold border-2 block mt-6';
            if (type === 'success') statusDiv.classList.add('bg-emerald-50', 'text-emerald-800', 'border-emerald-500');
            else if (type === 'error') statusDiv.classList.add('bg-red-50', 'text-red-800', 'border-red-500');
            else if (type === 'warn') statusDiv.classList.add('bg-yellow-50', 'text-yellow-800', 'border-yellow-500');
            else statusDiv.classList.add('bg-blue-50', 'text-blue-800', 'border-blue-500');
            statusDiv.innerHTML = message;
            statusDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        async function fetchWithRetry(url, options, retries = 5, delay = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTPエラー ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return fetchWithRetry(url, options, retries - 1, delay * 2);
                }
                throw error;
            }
        }

        // ==========================================
        // 🔄 AI変換（Gemini API）ロジック
        // ==========================================
        generateBtn.addEventListener('click', async () => {
            const rawText = rawTextInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!rawText) return showStatus("⚠️ 左側にクイズのネタとなる文章を貼り付けてください。", "warn");
            if (!apiKey) return showStatus("🔑 右上の「Gemini APIキー」を入力してください。", "warn");

            // UIを「処理中」の状態に変更
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-80', 'cursor-not-allowed', 'animate-pulse');
            generateBtn.classList.remove('active:translate-y-[4px]', 'active:translate-x-[4px]', 'active:shadow-none');
            generateBtnText.textContent = 'AIで変換中...';
            generateSpinner.classList.remove('hidden');

            showStatus("⏳ AIがクイズを構築し、JSONデータを生成しています...（通常5〜15秒）", "info");

            const targetRegion = "福井県"; 

            const systemPrompt = `あなたは「${targetRegion}ご当地クイズ」のクイズ制作・編集のトッププロフェッショナルです。
ユーザーから提供されたクイズの「ネタ」や「Q&Aのテキスト」、「地域の資料テキスト」を読み込み、アプリへ一括登録するための「100%完璧なJSONデータ」に変換・拡張する役割を担います。

【究極のルール】
1. JSON以外のテキストは1文字も出力しないこと。挨拶やマークダウン装飾も禁止。純粋な [ から始まり ] で終わるJSON配列のみを出力すること。

【処理フローとデータ整形ルール】
1. カテゴリの分類: 必ず以下の7つのうち最も適したものを割り振ること。
「自然・地理」「伝統工芸・ものづくり」「観光」「イベント・祭り」「方言」「歴史」「グルメ」
2. 魅力的な「ハズレ選択肢」の自動生成（計4択）: 正解に対して、実在しそうな絶妙な難易度を持つハズレの選択肢を3つ考え、計4択の options を作成してください（optionsの中に必ず正解を含めること）。
3. 「へぇ〜！」と唸る解説文の作成: 歴史的な背景、その地域ならではの習慣などを交え、解いた人が「なるほど！」と思えるような魅力的で知的な解説を2〜3文（100〜150文字程度）で作成してください。
4. IDの付与: 問題には自動的に一意のID（例: q_001 など）を割り当ててください。`;

            const responseSchema = {
                type: "ARRAY",
                description: "クイズオブジェクトのリスト",
                items: {
                    type: "OBJECT",
                    properties: {
                        id: { type: "STRING" },
                        category: { 
                            type: "STRING", 
                            enum: ["自然・地理", "伝統工芸・ものづくり", "観光", "イベント・祭り", "方言", "歴史", "グルメ"]
                        },
                        question: { type: "STRING" },
                        options: { type: "ARRAY", items: { type: "STRING" } },
                        answer: { type: "STRING" },
                        explanation: { type: "STRING" }
                    },
                    required: ["id", "category", "question", "options", "answer", "explanation"]
                }
            };

            const endpointUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            try {
                const result = await fetchWithRetry(endpointUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: rawText }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: responseSchema
                        }
                    })
                });

                const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!jsonText) throw new Error("AIからの応答テキストが空でした。");

                jsonInput.value = JSON.stringify(JSON.parse(jsonText), null, 2);
                showStatus("✨ AIによる自動クイズ生成が成功しました！", "success");
            } catch (error) {
                showStatus(`❌ クイズ生成に失敗しました。<br>エラー詳細: ${error.message}`, "error");
            } finally {
                // UIを元の状態に戻す
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-80', 'cursor-not-allowed', 'animate-pulse');
                generateBtn.classList.add('active:translate-y-[4px]', 'active:translate-x-[4px]', 'active:shadow-none');
                generateBtnText.textContent = '✨ AIで4択クイズ（JSON）に変換する';
                generateSpinner.classList.add('hidden');
            }
        });

        // ==========================================
        // 🚀 Firestoreアップロードロジック
        // ==========================================
        uploadBtn.addEventListener('click', async () => {
            if (!db) return showStatus("Firebaseが接続されていません。コード内の firebaseConfig を確認してください。", "error");

            const rawData = jsonInput.value.trim();
            if (!rawData) return showStatus("⚠️ アップロードするJSONデータがありません。", "warn");

            let dataArray;
            try {
                dataArray = JSON.parse(rawData);
                if (!Array.isArray(dataArray)) throw new Error("データは配列である必要があります。");
            } catch (error) {
                return showStatus(`❌ JSONの解析エラー: ${error.message}`, "error");
            }

            // UIを「処理中」の状態に変更
            uploadBtn.disabled = true;
            uploadBtn.classList.add('opacity-80', 'cursor-not-allowed', 'animate-pulse');
            uploadBtn.classList.remove('active:translate-y-[4px]', 'active:translate-x-[4px]', 'active:shadow-none');
            uploadBtnText.textContent = 'アップロード中...';
            uploadSpinner.classList.remove('hidden');

            showStatus(`⏳ ${dataArray.length}件のクイズデータをFirestoreへ送信しています...`, "info");

            let successCount = 0;
            try {
                for (const item of dataArray) {
                    const docId = item.id || `q_${Math.random().toString(36).substr(2, 9)}`;
                    const finalItem = { ...item, id: docId };
                    const docRef = doc(db, "quizzes", docId);
                    await setDoc(docRef, finalItem);
                    successCount++;
                }
                showStatus(`🎉 一括アップロードが完了しました！<br>${successCount}件のデータを <b>quizzes</b> コレクションへ保存しました。`, "success");
                jsonInput.value = ''; 
            } catch (error) {
                showStatus(`❌ アップロード中にエラーが発生しました。<br>エラー詳細: ${error.message}`, "error");
            } finally {
                // UIを元の状態に戻す
                uploadBtn.disabled = false;
                uploadBtn.classList.remove('opacity-80', 'cursor-not-allowed', 'animate-pulse');
                uploadBtn.classList.add('active:translate-y-[4px]', 'active:translate-x-[4px]', 'active:shadow-none');
                uploadBtnText.textContent = '🚀 Firestoreに一括アップロード';
                uploadSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
